interface:
  display_name: "Atomic Website Clone"
  short_description: "Local 1:1 clone with interaction discovery, motion, and video QA"
  default_prompt: "Use $atomic-website-clone to make a local-only high-fidelity visual clone of the provided website page. Discover unknown controls, animated surfaces, scroll panes, media, and late-triggered regions before implementation with probe screenshots, trigger rescans, scroll probes, motion samples, and an inventory seed; classify source regions by behavior; capture live source states, trigger-gated lifecycles, process order, motion, CDP animation timelines, internal scroll, videos, and assets; compare source/local states, frames, discovery candidates, and video quality with FFmpeg metrics when available; reproduce only the dynamic interactions the source actually has; do not invent generated previews, slide decks, document viewers, or artifact panes when absent from the source; get reviewer PASS; then clean temporary files while keeping the compact final verification summary."
